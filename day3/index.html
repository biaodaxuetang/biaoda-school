<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>表达学堂｜表达成长课程方案</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <!-- ================= 页面主体（你原来的不动） ================= -->

  <header class="topbar">
    <div class="nav-wrap">
      <a class="brand" href="#home">
        <span class="brand-icon">◆</span>
        <span>表达学堂</span>
        <em>让表达更有力量</em>
      </a>

      <nav class="nav">
        <a href="#home">首页</a>
        <a href="#courses">课程方案</a>
      </nav>

      <a class="login-btn" href="javascript:void(0)" onclick="openWechat()">
        咨询课程顾问
      </a>
    </div>
  </header>

  <main id="home">

    <!-- ====== 示例课程 ====== -->
    <section class="courses" id="courses">

      <div class="course-card">
        <h3>说服高手实战营</h3>
        <p>提升关系沟通与影响力</p>

        <a href="https://s.bluedothub.cn/VM5bxbV"
           target="_blank"
           onclick="sendReminder('立即报名：说服高手实战营')">
           立即报名
        </a>
      </div>

    </section>

  </main>

  <!-- ================= 弹窗 ================= -->
  <div id="wechatModal" class="modal">
    <div class="modal-card">
      <button onclick="closeWechat()">×</button>
      <h2>咨询课程顾问</h2>
      <p>添加老师获取学习方案</p>
    </div>
  </div>

  <!-- ================= 核心 JS（已修复） ================= -->
  <script>

    /***********************
     * 1️⃣ 配置区（必须改）
     ***********************/
    const REMINDER_API_URL = "https://【你的完整云函数HTTP触发地址】";
    const DEFAULT_SALES_ID = "wang";

    /***********************
     * 2️⃣ 获取老师ID（修复未知老师）
     ***********************/
    (function initSalesId() {
      const urlParams = new URLSearchParams(window.location.search);
      const sid = urlParams.get("sid");

      if (sid) {
        localStorage.setItem("sales_id", sid);
      }

      if (!localStorage.getItem("sales_id")) {
        localStorage.setItem("sales_id", DEFAULT_SALES_ID);
      }
    })();

    /***********************
     * 3️⃣ 发送提醒（修复版）
     ***********************/
    function sendReminder(actionName) {

      if (!REMINDER_API_URL || REMINDER_API_URL.includes("【你的完整")) {
        console.warn("❌ 请先配置云函数URL");
        return;
      }

      const sid = localStorage.getItem("sales_id") || DEFAULT_SALES_ID;

      const payload = {
        sid: sid,
        action: actionName,
        page: window.location.href,
        title: document.title,

        // ✅ 中国时间修复
        time: new Date().toLocaleString("zh-CN", {
          timeZone: "Asia/Shanghai",
          hour12: false
        })
      };

      console.log("📡 点击事件上报：", payload);

      fetch(REMINDER_API_URL, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      })
      .then(res => {
        console.log("✅ 上报成功");
      })
      .catch(err => {
        console.error("❌ 上报失败：", err);
      });
    }

    /***********************
     * 4️⃣ 弹窗控制
     ***********************/
    function openWechat() {
      sendReminder("咨询课程顾问");
      document.getElementById("wechatModal").style.display = "block";
    }

    function closeWechat() {
      document.getElementById("wechatModal").style.display = "none";
    }

  </script>

</body>
</html>
